<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瓦斯抽采钻孔排水模拟系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>瓦斯抽采钻孔排水模拟系统 <span id="connectionStatus" class="status-offline">离线</span></h1>
        
        <div class="main-content">
            <div class="canvas-container">
                <canvas id="simulationCanvas" width="900" height="500"></canvas>
                
                <div class="chart-container" style="margin-top: 20px;">
                    <h3>液位变化趋势</h3>
                    <canvas id="trendChart" width="860" height="200"></canvas>
                </div>
                
                <div class="chart-container" style="margin-top: 15px;">
                    <h3>钻孔液位剖面</h3>
                    <canvas id="profileChart" width="860" height="150"></canvas>
                </div>
            </div>
            
            <div class="control-panel">
                <div class="control-group">
                    <label>抽采负压: <span id="pressureValue">30</span> kPa</label>
                    <input type="range" id="pressureSlider" min="5" max="80" value="30" step="1">
                </div>
                
                <div class="control-group">
                    <label>钻孔倾角: <span id="angleValue">15</span>°</label>
                    <input type="range" id="angleSlider" min="-10" max="45" value="15" step="1">
                </div>
                
                <div class="control-group">
                    <label>管径: <span id="diameterValue">0.10</span> m</label>
                    <input type="range" id="diameterSlider" min="0.05" max="0.3" value="0.1" step="0.01">
                </div>
                
                <div class="control-group">
                    <label>动画速度: <span id="speedValue">1.0</span>x</label>
                    <input type="range" id="speedSlider" min="0.1" max="3" value="1" step="0.1">
                </div>
                
                <div class="button-group">
                    <button id="realtimeBtn">实时模式</button>
                    <button id="startBtn">开始模拟</button>
                    <button id="pauseBtn">暂停</button>
                    <button id="saveBtn">保存快照</button>
                </div>
                
                <div class="button-group">
                    <button id="optimizeBtn">优化建议</button>
                </div>
                
                <div class="results">
                    <h3>计算结果</h3>
                    <p>系统状态: <span id="systemStatus">--</span></p>
                    <p>积液位置: <span id="liquidPosition">--</span> m</p>
                    <p>液位高度: <span id="liquidLevelHeight">--</span> m</p>
                    <p>持液率: <span id="holdUp">--</span>%</p>
                    <p>排水效率: <span id="drainageEfficiency">--</span>%</p>
                    <p>流态: <span id="flowRegime">--</span></p>
                    <p>气流速度: <span id="gasVelocity">--</span> m/s</p>
                    <p>临界气速: <span id="criticalGasVelocity">--</span> m/s</p>
                    <p>液流速度: <span id="liquidVelocity">--</span> m/s</p>
                    <p>总压降: <span id="pressureDrop">--</span> Pa</p>
                    <p>气锁状态: <span id="gasLockStatus">--</span></p>
                </div>
                
                <div class="analysis-panel">
                    <h3>智能分析</h3>
                    <div id="riskList" class="risk-list"></div>
                    <div id="suggestionList" class="suggestion-list"></div>
                </div>
                
                <div class="legend">
                    <h3>图例</h3>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #8B4513;"></div>
                        <span>煤层</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #4a4a4a;"></div>
                        <span>钻孔</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #1E90FF;"></div>
                        <span>水相</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #FF6347;"></div>
                        <span>气相</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="optimization-modal" id="optimizationModal" style="display: none;">
            <div class="modal-content">
                <h3>参数优化建议</h3>
                <button class="close-btn" onclick="closeOptimizationModal()">&times;</button>
                <div id="optimizationResults"></div>
            </div>
        </div>
        
        <div class="snapshots">
            <h3>历史快照</h3>
            <div id="snapshotList" class="snapshot-list"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
